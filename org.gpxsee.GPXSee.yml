app-id: org.gpxsee.GPXSee
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: gpxsee
finish-args:
  - --device=dri
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  - --filesystem=home
rename-desktop-file: gpxsee.desktop
rename-icon: gpxsee
rename-mime-file: gpxsee.xml
rename-appdata-file: gpxsee.appdata.xml
modules:
  - name: gpxsee
    buildsystem: qmake
    post-install:
      - lrelease gpxsee.pro
    sources:
      - type: archive
        url: https://github.com/tumic0/GPXSee/archive/refs/tags/16.11.tar.gz
        sha256: 1542387d670d870829e1d52d66f7ea3ac6628a05fcaa39a78963ab7a18ebc70b
      - type: patch
        path: gpxsee-appdata.patch
